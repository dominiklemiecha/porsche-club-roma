networks:
  porsche-internal:
    driver: bridge
  dokploy-network:
    external: true

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [porsche-internal]

  api:
    build: ./api
    restart: unless-stopped
    depends_on:
      db: { condition: service_healthy }
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET:   ${JWT_SECRET}
      ADMIN_USER:   ${ADMIN_USER}
      ADMIN_PASS:   ${ADMIN_PASS}
      CORS_ORIGIN:  ${CORS_ORIGIN}
      NODE_ENV:     production
    volumes:
      - "./elenco_soci_2026-03-10.xlsx:/seed/soci.xlsx:ro"
    expose:
      - "3001"
    networks: [porsche-internal]

  web:
    build:
      context: ./web
      args:
        NEXT_PUBLIC_API_URL: ""
    restart: unless-stopped
    depends_on: [api]
    environment:
      NEXT_PUBLIC_API_URL: ""
      INTERNAL_API_URL: http://api:3001
    expose:
      - "3000"
    networks:
      - porsche-internal
      - dokploy-network

volumes:
  pgdata:
